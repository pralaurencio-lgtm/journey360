<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Journey 67 — Belong. Discover. Grow. Serve.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F1E7;
    --paper-2:#EFEADC;
    --card:#FBF8F1;
    --ink:#1B1D36;
    --ink-2:#4A4C6B;
    --ink-3:#7C7E96;
    --line:rgba(27,29,54,.12);
    --line-2:rgba(27,29,54,.07);

    --belong:#C8746D;
    --discover:#3C888F;
    --grow:#7C9954;
    --serve:#DDA13A;

    --belong-soft:#f3e2df;
    --discover-soft:#dfeceb;
    --grow-soft:#e8edda;
    --serve-soft:#f6ead0;

    --gold:#DDA13A;
    --radius:18px;
    --shadow:0 1px 2px rgba(27,29,54,.05), 0 10px 30px -18px rgba(27,29,54,.35);
    --maxw:1120px;
    --serif:"Fraunces", Georgia, "Times New Roman", serif;
    --sans:"Figtree", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    background-image:radial-gradient(1100px 600px at 78% -8%, rgba(221,161,58,.16), transparent 60%),
                     radial-gradient(900px 700px at -10% 110%, rgba(60,136,143,.10), transparent 55%);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:500;line-height:1.08;letter-spacing:-.01em;margin:0}
  p{margin:0}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
  .serif{font-family:var(--serif)}
  .it{font-style:italic}
  .muted{color:var(--ink-2)}
  .tiny{font-size:.78rem}
  .center{text-align:center}
  :focus-visible{outline:2.5px solid var(--gold);outline-offset:3px;border-radius:6px}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:.5rem;
    padding:.72rem 1.25rem;border-radius:100px;border:1px solid transparent;
    font-weight:600;font-size:.95rem;line-height:1;transition:.18s ease;
    background:var(--ink);color:var(--paper);
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px -12px rgba(27,29,54,.6)}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn.ghost:hover{border-color:var(--ink);background:rgba(27,29,54,.03);box-shadow:none}
  .btn.gold{background:var(--gold);color:#2a1e00}
  .btn.sm{padding:.5rem .9rem;font-size:.85rem}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

  .eyebrow{
    font-family:var(--sans);font-weight:600;font-size:.72rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--ink-3);
  }

  /* ---------- Nav ---------- */
  header.nav{position:sticky;top:0;z-index:40;backdrop-filter:blur(10px);
    background:rgba(245,241,231,.82);border-bottom:1px solid var(--line-2)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:66px}
  .brand{display:flex;align-items:center;gap:.6rem;font-family:var(--serif);font-size:1.2rem;font-weight:600;letter-spacing:-.02em;cursor:pointer}
  .brand .glyph{width:26px;height:26px;flex:none}
  .nav-links{display:flex;align-items:center;gap:.35rem}
  .nav-links a{padding:.5rem .7rem;border-radius:100px;font-weight:500;font-size:.92rem;color:var(--ink-2);transition:.15s}
  .nav-links a:hover{color:var(--ink);background:rgba(27,29,54,.05)}
  .nav-right{display:flex;align-items:center;gap:.6rem}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);
    display:grid;place-items:center;font-weight:700;font-size:.9rem;font-family:var(--sans)}
  .nav-user{display:flex;align-items:center;gap:.55rem;cursor:pointer;padding:.25rem .35rem .25rem .5rem;border-radius:100px;border:1px solid var(--line)}
  .nav-user:hover{background:rgba(27,29,54,.03)}
  .menu-toggle{display:none;background:none;border:1px solid var(--line);border-radius:10px;padding:.4rem .55rem}

  /* ---------- Hero ---------- */
  .hero{padding:64px 0 30px}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
  .hero h1{font-size:clamp(3rem,7vw,5.4rem);letter-spacing:-.035em;font-weight:600}
  .hero .path{font-family:var(--serif);font-style:italic;font-size:clamp(1.5rem,3.6vw,2.3rem);
    color:var(--ink);margin:.35rem 0 1.1rem;font-weight:500}
  .hero .path b{font-style:normal;font-weight:600}
  .hero .lede{font-size:1.12rem;color:var(--ink-2);max-width:34ch;margin-bottom:1.7rem}
  .hero-cta{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center}
  .ringwrap{position:relative;display:grid;place-items:center}
  .ringwrap .core{position:absolute;text-align:center;pointer-events:none}
  .ringwrap .core .big{font-family:var(--serif);font-size:2.7rem;line-height:1;font-weight:600}
  .ringwrap .core .small{font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-top:.35rem}
  svg .arc-track{fill:none;stroke:rgba(27,29,54,.09);stroke-width:15;stroke-linecap:round}
  svg .arc-fill{fill:none;stroke-width:15;stroke-linecap:round;transition:stroke-dasharray 1.1s cubic-bezier(.22,1,.36,1)}
  svg text.lbl{font-family:var(--sans);font-weight:600;font-size:14px;fill:var(--ink)}
  svg text.emo{font-size:20px}
  svg text.pct{font-family:var(--sans);font-weight:600;font-size:12px;fill:var(--ink-3)}
  @keyframes drawin{from{stroke-dasharray:0 100}}
  .animate .arc-fill{animation:drawin 1.2s cubic-bezier(.22,1,.36,1) both}

  /* ---------- Pillars ---------- */
  section.block{padding:56px 0}
  .sec-head{max-width:60ch;margin-bottom:34px}
  .sec-head h2{font-size:clamp(1.9rem,4vw,2.7rem);font-weight:500}
  .sec-head p{color:var(--ink-2);margin-top:.7rem;font-size:1.05rem}

  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 20px 20px;position:relative;overflow:hidden;transition:.2s ease;cursor:pointer;display:flex;flex-direction:column;min-height:230px}
  .pcard:before{content:"";position:absolute;left:0;top:0;height:4px;width:100%;background:var(--pc)}
  .pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--pc)}
  .pcard .emo{font-size:1.7rem}
  .pcard h3{font-size:1.5rem;margin:.55rem 0 .2rem;font-weight:600}
  .pcard .tag{color:var(--ink-2);font-size:.92rem;margin-bottom:.9rem}
  .pcard .q{margin-top:auto;font-family:var(--serif);font-style:italic;color:var(--pc);font-size:.98rem;font-weight:500}
  .pcard .go{margin-top:.9rem;font-weight:600;font-size:.88rem;color:var(--ink);display:inline-flex;gap:.3rem;align-items:center}
  .pcard:hover .go{gap:.55rem}

  /* ---------- Pillar detail ---------- */
  .detail-hero{padding:52px 0 8px}
  .detail-hero .eyebrow{color:var(--pc)}
  .detail-hero h1{font-size:clamp(2.6rem,6vw,4rem);font-weight:600;margin:.5rem 0 .3rem}
  .detail-hero .path{font-family:var(--serif);font-style:italic;font-size:1.4rem;color:var(--pc);font-weight:500}
  .detail-hero p{max-width:56ch;color:var(--ink-2);font-size:1.08rem;margin-top:1rem}
  .qbanner{display:inline-flex;align-items:center;gap:.7rem;margin-top:1.4rem;padding:.7rem 1.15rem;
    background:var(--pc-soft);border-radius:100px;font-family:var(--serif);font-style:italic;font-size:1.05rem}
  .qbanner .k{font-family:var(--sans);font-style:normal;font-weight:600;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--pc);opacity:.85}

  .res-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:8px}
  .res{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px;
    display:flex;gap:14px;align-items:flex-start;transition:.16s}
  .res:hover{border-color:var(--pc);background:var(--card)}
  .res .rtitle{font-weight:600;font-size:1.02rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .res .rdesc{color:var(--ink-2);font-size:.92rem;margin-top:.25rem}
  .res .ract{margin-top:.7rem;display:flex;gap:.5rem;flex-wrap:wrap}
  .chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);flex:none;margin-top:2px;
    display:grid;place-items:center;transition:.15s;background:transparent}
  .chk.done{background:var(--pc);border-color:var(--pc)}
  .chk.done svg{opacity:1;transform:scale(1)}
  .chk svg{opacity:0;transform:scale(.5);transition:.15s;stroke:#fff}
  .pill-tag{font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    padding:.18rem .5rem;border-radius:100px;background:var(--paper-2);color:var(--ink-3)}
  .pill-tag.pub{background:var(--grow-soft);color:#516a2f}
  .pill-tag.mem{background:var(--serve-soft);color:#7a5510}
  .pill-tag.assess{background:var(--discover-soft);color:#20585d}

  /* ---------- Dashboard ---------- */
  .dash-top{display:grid;grid-template-columns:1.15fr 1fr;gap:34px;align-items:center;padding:46px 0 18px}
  .dash-top h1{font-size:clamp(2rem,4.4vw,2.9rem);font-weight:600}
  .stage-chip{display:inline-flex;align-items:center;gap:.5rem;padding:.4rem .85rem;border-radius:100px;
    background:var(--ink);color:var(--paper);font-size:.82rem;font-weight:600;margin-top:.7rem}
  .bars{display:flex;flex-direction:column;gap:14px;margin-top:22px;max-width:420px}
  .bar-row{display:grid;grid-template-columns:96px 1fr 42px;align-items:center;gap:12px}
  .bar-row .nm{font-weight:600;font-size:.92rem;display:flex;align-items:center;gap:.4rem}
  .track{height:9px;border-radius:100px;background:rgba(27,29,54,.09);overflow:hidden}
  .fill{height:100%;border-radius:100px;transition:width .9s cubic-bezier(.22,1,.36,1)}
  .bar-row .vv{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;font-size:.86rem;color:var(--ink-2)}

  .nextstep{background:linear-gradient(180deg,var(--serve-soft),#f3e6c9);border:1px solid rgba(221,161,58,.4);
    border-radius:var(--radius);padding:24px 26px;margin:14px 0 6px;display:flex;gap:20px;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .nextstep .ns-k{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#8a5f14}
  .nextstep h3{font-size:1.5rem;margin:.35rem 0 .2rem;font-weight:600}
  .nextstep p{color:#6c5a2f;max-width:52ch}

  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 22px}
  .panel h3{font-size:1.25rem;margin-bottom:2px;font-weight:600}
  .panel .sub{color:var(--ink-3);font-size:.85rem;margin-bottom:14px}
  .item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-top:1px solid var(--line-2)}
  .item:first-of-type{border-top:0}
  .item .il{display:flex;align-items:center;gap:12px;min-width:0}
  .idot{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:1rem;background:var(--paper-2)}
  .item .nm{font-weight:600;font-size:.96rem}
  .item .rst{font-size:.82rem;color:var(--ink-2)}
  .item .rst b{color:var(--discover);font-weight:600}
  .badge{font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:100px;background:var(--paper-2);color:var(--ink-3)}
  .badge.done{background:var(--grow-soft);color:#4f6a2c}

  .course-prog{height:6px;border-radius:100px;background:rgba(27,29,54,.09);margin-top:8px;overflow:hidden}
  .course-prog .cf{height:100%;background:var(--grow);border-radius:100px}

  /* ---------- Forms / cards ---------- */
  .formcard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:34px;box-shadow:var(--shadow);max-width:620px;margin:0 auto}
  .field{margin-bottom:16px}
  .field label{display:block;font-weight:600;font-size:.86rem;margin-bottom:.4rem}
  .field .hint{font-weight:400;color:var(--ink-3);font-size:.8rem}
  .input,select{width:100%;padding:.75rem .85rem;border-radius:12px;border:1px solid var(--line);
    background:var(--paper);font-family:inherit;font-size:.98rem;color:var(--ink);transition:.15s}
  .input:focus,select:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(221,161,58,.18)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .stages{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stage-opt{border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.15s;display:flex;gap:10px;align-items:center;background:var(--paper)}
  .stage-opt:hover{border-color:var(--ink-3)}
  .stage-opt.sel{border-color:var(--gold);background:var(--serve-soft);box-shadow:0 0 0 2px rgba(221,161,58,.25)}
  .stage-opt .r{width:18px;height:18px;border-radius:50%;border:2px solid var(--ink-3);flex:none;display:grid;place-items:center}
  .stage-opt.sel .r{border-color:var(--gold)}
  .stage-opt.sel .r:after{content:"";width:9px;height:9px;border-radius:50%;background:var(--gold)}
  .stage-opt .st{font-weight:600;font-size:.92rem}
  .stage-opt .sd{font-size:.76rem;color:var(--ink-3)}

  /* ---------- Assessment ---------- */
  .assess-shell{max-width:640px;margin:0 auto;padding-top:12px}
  .qprog{height:6px;border-radius:100px;background:rgba(27,29,54,.1);overflow:hidden;margin:8px 0 26px}
  .qprog .qf{height:100%;background:var(--gold);transition:width .3s}
  .statement{font-family:var(--serif);font-size:1.7rem;line-height:1.25;font-weight:500;margin-bottom:26px}
  .scale{display:grid;gap:9px}
  .scale button{text-align:left;padding:.85rem 1.05rem;border-radius:12px;border:1px solid var(--line);
    background:var(--card);font-weight:500;font-size:.98rem;transition:.14s;display:flex;justify-content:space-between;align-items:center}
  .scale button:hover{border-color:var(--gold);background:var(--serve-soft);transform:translateX(3px)}
  .scale button .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--ink-3)}
  .result-hero{text-align:center;padding:14px 0}
  .result-hero .rname{font-size:clamp(2rem,5vw,3rem);font-weight:600;color:var(--discover);margin:.3rem 0}
  .tag-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .tag-row span{padding:.35rem .8rem;border-radius:100px;background:var(--paper-2);font-size:.85rem;font-weight:600}

  /* ---------- Prayer / small forms ---------- */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:var(--paper);padding:.85rem 1.3rem;border-radius:100px;font-weight:600;
    font-size:.92rem;z-index:80;transition:.3s;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Footer ---------- */
  footer{border-top:1px solid var(--line);margin-top:40px;padding:44px 0 60px}
  .foot-in{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .foot-in .path{font-family:var(--serif);font-style:italic;font-size:1.3rem;margin-top:.4rem}
  .foot-links{display:flex;gap:18px;flex-wrap:wrap;color:var(--ink-2);font-size:.9rem}
  .foot-links a:hover{color:var(--ink)}

  .backlink{display:inline-flex;align-items:center;gap:.4rem;color:var(--ink-2);font-weight:600;font-size:.9rem;margin-bottom:8px}
  .backlink:hover{color:var(--ink)}

  /* ---------- Leadership / back-end ---------- */
  .lead-banner{background:var(--ink);color:var(--paper)}
  .lead-banner .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:12px;padding-bottom:12px;flex-wrap:wrap}
  .lead-banner .lb-l{display:flex;align-items:center;gap:.7rem;font-weight:600}
  .lead-banner .dotpulse{width:9px;height:9px;border-radius:50%;background:var(--serve)}
  .lead-banner .lb-role{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,241,231,.65)}
  .role-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.28rem .7rem;border-radius:100px;font-size:.76rem;font-weight:700;letter-spacing:.03em}
  .role-badge.mentor{background:var(--discover-soft);color:#20585d}
  .role-badge.guide{background:var(--belong-soft);color:#8a3f38}
  .role-badge.leader{background:var(--serve-soft);color:#7a5510}
  .caps{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .caps span{font-size:.8rem;font-weight:600;padding:.35rem .75rem;border-radius:100px;background:var(--card);border:1px solid var(--line);color:var(--ink-2);display:inline-flex;gap:.4rem;align-items:center}
  .caps span:before{content:"✓";color:var(--grow);font-weight:800}

  .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px}
  .stat .n{font-family:var(--serif);font-size:2.3rem;font-weight:600;line-height:1}
  .stat .l{font-size:.82rem;color:var(--ink-2);margin-top:.3rem}
  .stat.warn .n{color:var(--belong)}

  .avgblock{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:22px}
  .avgblock h4{font-family:var(--sans);font-weight:700;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar .search{flex:1;min-width:200px}
  .toolbar select,.toolbar .search input{padding:.6rem .8rem;border-radius:10px;border:1px solid var(--line);background:var(--card);font-family:inherit;font-size:.9rem;width:100%}
  .toggle{display:inline-flex;align-items:center;gap:.5rem;font-size:.86rem;font-weight:600;padding:.55rem .85rem;border-radius:10px;border:1px solid var(--line);background:var(--card);cursor:pointer;white-space:nowrap}
  .toggle.on{background:var(--belong-soft);border-color:var(--belong);color:#8a3f38}

  .mtable-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:16px;background:var(--card)}
  table.mtable{width:100%;border-collapse:collapse;min-width:760px}
  table.mtable th{text-align:left;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:700;padding:14px 16px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  table.mtable th.nosort{cursor:default}
  table.mtable th .caret{opacity:.5;font-size:.7rem}
  table.mtable td{padding:13px 16px;border-bottom:1px solid var(--line-2);font-size:.92rem;vertical-align:middle}
  table.mtable tr.mrow{cursor:pointer;transition:.12s}
  table.mtable tr.mrow:hover td{background:var(--paper-2)}
  table.mtable tr:last-child td{border-bottom:none}
  .m-name{font-weight:600;display:flex;align-items:center;gap:.5rem}
  .m-mail{color:var(--ink-3);font-size:.78rem;font-weight:400}
  .flag{font-size:.66rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#8a3f38;background:var(--belong-soft);padding:.15rem .45rem;border-radius:100px}
  .you-tag{font-size:.66rem;font-weight:800;color:#20585d;background:var(--discover-soft);padding:.15rem .45rem;border-radius:100px}
  .minibars{display:flex;gap:5px}
  .minibars .mb{width:30px}
  .minibars .mb .mt{height:7px;border-radius:100px;background:rgba(27,29,54,.1);overflow:hidden}
  .minibars .mb .mf{height:100%;border-radius:100px}
  .minibars .mb .ml{font-size:.58rem;color:var(--ink-3);text-align:center;margin-top:2px;font-weight:700;letter-spacing:.03em}
  .ov{font-variant-numeric:tabular-nums;font-weight:700}
  .mentor-cell{font-size:.86rem}
  .mentor-cell .none{color:var(--ink-3);font-style:italic}

  .empty{text-align:center;padding:50px 20px;color:var(--ink-3)}

  /* member detail (staff) */
  .md-head{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:flex-start;margin-bottom:6px}

function buildPlan(books, perDay){
  const days=[]; 
  books.forEach(b=>{ for(let c=1;c<=b.ch;c+=perDay){ const end=Math.min(c+perDay-1,b.ch);
    days.push(end>c ? `${b.name} ${c}–${end}` : `${b.name} ${c}`); } });
  return days;
}

/* Uses window.storage shared=true so multiple people see the same data.
   Falls back to in-memory so it still works if storage is unavailable. */
const SHARED={};
async function dbGet(k){
  try{ const r=await window.storage.get(k,true); if(r&&r.value) return JSON.parse(r.value); }
  catch(e){}
  return (k in SHARED)?SHARED[k]:null;
}
async function dbSet(k,v){

  try{ await window.storage.set(k, JSON.stringify(v), true); }catch(e){}
}
async function dbPush(k,item){ const arr=(await dbGet(k))||[]; arr.push(item); await dbSet(k,arr); return arr; }

/* progress: floor from stage, raised by completed steps within a pillar */
function pillarSteps(k){ return PILLARS[k].resources.map(r=>r.id); }
function progressFor(k){
  const floor = (S.account && STAGES.find(s=>s.id===S.account.stage)?.floor[k]) || 0;
  const steps = pillarSteps(k);
  const done = steps.filter(id=>S.completed[id]).length;
  const earned = steps.length ? Math.round(done/steps.length*100) : 0;
  return Math.max(floor, earned);
}
function allProgress(){ const o={}; ORDER.forEach(k=>o[k]=progressFor(k)); return o; }

/* Activity- and assessment-aware recommender for the signed-in member. */
function computeNextStep(){
  const p = allProgress();
  const A = S.assessments||{};
  const streak = readingStreak();
  const R = (title,body,cta,view,param)=>({title,body,cta,view,param});

  // 1. Belonging: no group yet
  if(!S.groupId){
    return R('Join a small group',
      'Relationships are the front door. Find a group of people to walk with.',
      'Browse groups', 'groups', null);
  }
  // 2. Belong not complete
  if(p.belong<100){
    return R('Find people who care', 'Keep settling into community — connect through a Belong resource.',
      'Go to Belong', 'pillar', 'belong');
  }
  // 3. Discover: strengths not taken
  if(!A.strengths){
    return R('Take the Strengths assessment',
      'You’ve found community. Now discover how you’re naturally wired.',
      'Start Strengths', 'assessment', 'strengths');
  }
  // 4. Discover incomplete
  if(p.discover<100){
    return R('Keep exploring your purpose',
      `Your top strength is ${A.strengths.name}. Keep going in Discover to see where it points.`,
      'Go to Discover', 'pillar', 'discover');
  }
  // 5. No Bible reading rhythm
  if(!S.plan){
    return R('Start a daily Bible reading plan',
      'A steady rhythm in Scripture is how growth becomes a habit. Pick a plan that fits.',
      'Choose a plan', 'today', null);
  }
  // 6. Reading rhythm exists but stalled today
  if(S.plan && !isTodayRead()){
    const body = streak>1 ? `You’re on a ${streak}-day streak — don’t break the chain.` : 'Today’s passage is waiting for you.';
    return R('Do today’s reading', body, 'Open today', 'today', null);
  }
  // 7. Grow incomplete
  if(p.grow<100){
    return R('Build your next habit',
      'You’re growing well. Add a habit or course from the Grow pathway.',
      'Go to Grow', 'grow', null);
  }
  // 8. Gifts not taken
  if(!A.gifts){
    return R('Take the Spiritual Gifts assessment',
      'You’re maturing. Now discover how God has equipped you to serve others.',
      'Start Spiritual Gifts', 'assessment', 'gifts');
  }
  // 9. Gifts done, serve incomplete
  if(p.serve<100){
    return R('Explore ministry opportunities',
      `Your top gift is ${A.gifts.name}. Find a place to use it and bless others.`,
      'See where to serve', 'pillar', 'serve');
  }
  // 10. Full circle
  return R('Mentor someone new',
    'You’ve walked the whole journey. The best next step is to help someone else begin.',
    'Talk to your mentor', 'community', null);
}

/* ---------- date + plan + habit helpers ---------- */
function todayKey(){ return new Date().toISOString().slice(0,10); }
function dateKey(d){ return d.toISOString().slice(0,10); }
function daysBetween(iso){ return Math.floor((Date.now()-Date.parse(iso))/864e5); }
function planDayIndex(){ if(!S.plan) return 0; return Math.min(daysBetween(S.plan.start), PLANS[S.plan.id].days.length-1); }
function todayReading(){ if(!S.plan) return null; return PLANS[S.plan.id].days[planDayIndex()]; }
function isTodayRead(){ return !!(S.plan && S.plan.done && S.plan.done.includes(planDayIndex())); }
function readingStreak(){
  if(!S.plan||!S.plan.done) return 0;
  const done=new Set(S.plan.done); let i=planDayIndex(), streak=0;
  if(!done.has(i)) i--; // allow today not-yet-done
  while(i>=0 && done.has(i)){ streak++; i--; }
  return streak;
}
function habitCount(dateK){ const h=S.habits[dateK]||{}; return Object.values(h).filter(Boolean).length; }
function totalHabitDaysLogged(){ return Object.keys(S.habits).reduce((a,k)=>a+(habitCount(k)>0?1:0),0); }

/* group goal progress (0–100) computed from demo fixtures + live joins */
function groupStats(g){
  const ids = groupMemberIds(g.id);
  // members = fixtures whose id is in this group OR listed in shared joins; plus current user if joined
  const fixt = DEMO_MEMBERS.filter(m=>ids.includes(m.id) || m.groupId===g.id);
  const members = fixt.slice();
  if(S.groupId===g.id && S.account){ members.push(currentMember()); }
  const count = members.length;
  let pct=0;
  if(g.goal.type==='pillar'){
    const avg = count? members.reduce((a,m)=>a+(m.progress[g.goal.pillar]||0),0)/count : 0;
    pct = Math.min(100, Math.round(avg/g.goal.target*100));
  } else if(g.goal.type==='habits'){
    const sum = members.reduce((a,m)=>a+(m.id==='me'?totalHabitDaysLogged():(m.habitDays||0)),0);
    pct = Math.min(100, Math.round(sum/g.goal.target*100));
  } else if(g.goal.type==='reading'){
    const avg = count? members.reduce((a,m)=>a+(m.id==='me'?Math.round((S.plan&&S.plan.done?S.plan.done.length:0)/Math.max(1,PLANS[(S.plan&&S.plan.id)||'gospels'].days.length)*100):(m.readingPct||0)),0)/count : 0;
    pct = Math.round(avg);
  }
  return {count, pct};
}

/* ============================================================
   RING (SVG signature element)
   ============================================================ */
function polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
function arcPath(cx,cy,r,a1,a2){
  const [x1,y1]=polar(cx,cy,r,a1), [x2,y2]=polar(cx,cy,r,a2);
  const large = (a2-a1)>180?1:0;
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}
function ringSVG(progress, opts={}){
  const {labels=true, showPct=false, size=340, core=null, animate=false} = opts;
  const c=size/2, r=size*0.30;
  const gap=4;
  const quad={belong:[0,90], discover:[90,180], grow:[180,270], serve:[270,360]};
  let arcs='', lbls='';
  ORDER.forEach((k,i)=>{
    const [a,b]=quad[k]; const s=a+gap, e=b-gap;
    const track=arcPath(c,c,r,s,e), fill=arcPath(c,c,r,s,e);
    const pct=Math.max(0,Math.min(100,progress[k]));
    const col=PILLARS[k].color;
    arcs += `<path class="arc-track" d="${track}"/>`+
            `<path class="arc-fill" d="${fill}" stroke="${col}" pathLength="100" style="stroke-dasharray:${pct} 100;${animate?`animation-delay:${i*.14}s`:''}"/>`;
    if(labels){
      const mid=(a+b)/2; const [lx,ly]=polar(c,c,r+size*0.11,mid);
      lbls += `<text class="emo" x="${lx.toFixed(1)}" y="${(ly-6).toFixed(1)}" text-anchor="middle">${PILLARS[k].emoji}</text>`+
              `<text class="lbl" x="${lx.toFixed(1)}" y="${(ly+12).toFixed(1)}" text-anchor="middle">${PILLARS[k].name}</text>`+
              (showPct?`<text class="pct" x="${lx.toFixed(1)}" y="${(ly+27).toFixed(1)}" text-anchor="middle">${pct}%</text>`:'');
    }
  });
  const coreHTML = core ? `<div class="core">${core}</div>` : '';
  return `<div class="ringwrap ${animate?'animate':''}">
    <svg viewBox="0 0 ${size} ${size}" width="100%" style="max-width:${size}px" role="img" aria-label="Journey progress ring">
      ${arcs}${lbls}
    </svg>${coreHTML}</div>`;
}

let QUIZ=null;
function startAssess(type){
  if(!S.signedIn){ toast('Create a free account to take assessments.'); go('join'); return; }
  QUIZ={type, i:0, answers:[]};
  go('assessment');
}
function viewAssessment(){
  if(!QUIZ) return viewDashboard();
  const A=ASSESS[QUIZ.type];
  if(QUIZ.done){
    const res=QUIZ.result;
    return `<section class="block"><div class="wrap assess-shell center">
      <div class="eyebrow">${A.emoji} ${A.title} · your result</div>
      <div class="result-hero">
        <p class="muted" style="margin-top:8px">Your top ${QUIZ.type==='gifts'?'spiritual gift':'strength'} is</p>
        <div class="rname">${res.name}</div>
        <p class="muted" style="max-width:52ch;margin:0 auto">${res.blurb}</p>
        <div class="tag-row">${res.tags.map(t=>`<span>${t}</span>`).join('')}</div>
      </div>
      <div style="display:flex;gap:.7rem;justify-content:center;margin-top:26px;flex-wrap:wrap">
        <button class="btn" onclick="go('dashboard')">See it on my dashboard ${ARR}</button>
        <button class="btn ghost" onclick="startAssess('${QUIZ.type}')">Retake</button>
      </div>
    </div></section>`;
  }
  const q=A.questions[QUIZ.i];
  const pct=Math.round(QUIZ.i/A.questions.length*100);
  const scale=[['Strongly disagree',1],['Disagree',2],['Neutral',3],['Agree',4],['Strongly agree',5]];
  return `<section class="block"><div class="wrap assess-shell">
    <a class="backlink" onclick="go('dashboard')">← Save & exit</a>
    <div class="eyebrow">${A.emoji} ${A.title} assessment</div>
    <div class="qprog"><div class="qf" style="width:${pct}%"></div></div>
    <div class="tiny muted" style="margin-bottom:14px">Question ${QUIZ.i+1} of ${A.questions.length}</div>
    <div class="statement">“${q.t}”</div>
    <div class="scale">
      ${scale.map(([lab,val])=>`<button onclick="answer(${val})">${lab}<span class="dot"></span></button>`).join('')}
    </div>
  </div></section>`;
}
function answer(v){
  const A=ASSESS[QUIZ.type];
  QUIZ.answers.push({c:A.questions[QUIZ.i].c, v});
  QUIZ.i++;
  if(QUIZ.i>=A.questions.length){ finishQuiz(); }
  else render();
}
async function finishQuiz(){
  const A=ASSESS[QUIZ.type];
  const score={};
  QUIZ.answers.forEach(a=>{ score[a.c]=(score[a.c]||0)+a.v; });
  let top=Object.keys(score).sort((x,y)=>score[y]-score[x])[0];
  const result=A.results[top];
  QUIZ.done=true; QUIZ.result=result;
  S.assessments[QUIZ.type]={name:result.name, tags:result.tags, at:Date.now()};
  await saveState();
  render();
}

function currentStaff(){ return S.staff ? staffById(S.staff.id) : null; }
function effMentor(m){ return (S.ops.mentor && S.ops.mentor[m.id]!==undefined) ? S.ops.mentor[m.id] : m.mentorId; }
function memberOverall(m){ const p=m.progress; return Math.round((p.belong+p.discover+p.grow+p.serve)/4); }
function needsFollowup(m){ return m.lastDays>21 || (memberOverall(m)<20 && m.lastDays>=7); }
function ago(d){ return d===0?'today':d===1?'yesterday':d+' days ago'; }

function currentMember(){
  if(!S.account) return null;
  return { id:'me', name:S.account.name, email:S.account.email, stage:S.account.stage,
    progress:allProgress(), assessments:S.assessments||{}, mentorId:'st_david',
    joinedDays:Math.max(0,Math.round((Date.now()-(S.account.createdAt||Date.now()))/864e5)),
    lastDays:0, isYou:true };
}
function allMembers(){ const list=DEMO_MEMBERS.slice(); const me=currentMember(); if(me) list.unshift(me); return list; }
function memberById(id){ return allMembers().find(m=>m.id===id)||null; }
function scopedMembers(){
  const st=currentStaff(); if(!st) return [];
  const all=allMembers();
  if(st.role==='mentor') return all.filter(m=>effMentor(m)===st.id);
  return all;
}
function canView(m){ const st=currentStaff(); if(!st) return false; if(st.role==='mentor') return effMentor(m)===st.id; return true; }
function canReassign(){ const st=currentStaff(); return st && (st.role==='guide'||st.role==='leader'); }

function memberNextStep(m){
  const p=m.progress;
  for(const k of ORDER){ if(p[k]<100){ const r=PILLARS[k].resources.find(x=>x.tag!=='assess')||PILLARS[k].resources[0]; return `${PILLARS[k].name} — ${r.title.toLowerCase()}`; } }
  return 'Fully walked the pathway — invite them to mentor someone new.';
}

/* ---- filters / sort ---- */
let LEAD={ sort:'overall', dir:-1, q:'', stage:'', follow:false };
function setLead(field,val){ LEAD[field]=val; if(field==='sort'){ } render(); }
function sortBy(col){ if(LEAD.sort===col) LEAD.dir*=-1; else { LEAD.sort=col; LEAD.dir = col==='name'?1:-1; } render(); }
function toggleFollow(){ LEAD.follow=!LEAD.follow; render(); }

function filteredMembers(){
  let list=scopedMembers();
  if(LEAD.q){ const q=LEAD.q.toLowerCase(); list=list.filter(m=>m.name.toLowerCase().includes(q)||m.email.toLowerCase().includes(q)); }
  if(LEAD.stage) list=list.filter(m=>m.stage===LEAD.stage);
  if(LEAD.follow) list=list.filter(needsFollowup);
  const key={
    name:m=>m.name.toLowerCase(),
    stage:m=>STAGES.findIndex(s=>s.id===m.stage),
    overall:m=>memberOverall(m),
    last:m=>-m.lastDays,
  }[LEAD.sort]||(m=>memberOverall(m));
  list.sort((a,b)=>{ const x=key(a),y=key(b); return x<y?-1*LEAD.dir:x>y?1*LEAD.dir:0; });
  return list;
}

          <div class="bars" style="margin-top:20px">
            ${ORDER.map(k=>`<div class="bar-row"><div class="nm">${PILLARS[k].emoji} ${PILLARS[k].name}</div>
              <div class="track"><div class="fill" style="width:${m.progress[k]}%;background:${PILLARS[k].color}"></div></div>
              <div class="vv">${m.progress[k]===100?'✓':m.progress[k]+'%'}</div></div>`).join('')}
          </div>
        </div>
        ${ringSVG(m.progress,{labels:true,showPct:true,size:320,core,animate:true})}
      </div>

      <div class="nextstep" style="margin-top:8px">
        <div><div class="ns-k">Suggested next step</div><h3>${memberNextStep(m)}</h3>
        <p>Based on where ${m.name.split(' ')[0]} is on the pathway right now.</p></div>
        <button class="btn" onclick="nudge('${m.id}')">Suggest this to them ${ARR}</button>
      </div>

      <div class="dgrid">
        <div class="panel"><h3>Assessments</h3><div class="sub">How they’re wired, and how they’re equipped.</div>
          ${assessRow('Strengths','🧭', m.assessments.strengths)}
          ${assessRow('Spiritual Gifts','✨', m.assessments.gifts)}
        </div>

        <div class="panel"><h3>Notes &amp; check-ins</h3>
          <div class="sub">${st.role==='mentor'?'Private to you and other guides.':'Shared with the care team.'}</div>
          <div class="note-compose">
            <textarea id="note-${m.id}" placeholder="Add a private note — a conversation, a prayer request, something to remember…"></textarea>
            <div style="display:flex;gap:.6rem;margin-top:10px;flex-wrap:wrap">
              <button class="btn sm" onclick="addNote('${m.id}')">Save note</button>
              <button class="btn sm ghost" onclick="logCheckin('${m.id}')">Log a check-in ✓</button>
            </div>
          </div>
          <div class="timeline">
            ${timeline.length? timeline.map(t=>`<div class="tnote ${t.type==='checkin'?'checkin':''}">
              <div class="tav">${t.type==='checkin'?'✓':'✎'}</div>
              <div><div><span class="tby">${t.by}</span> <span class="twhen">· ${t.type==='checkin'?'checked in':'noted'} · ${new Date(t.at).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span></div>
              <div class="ttext">${(t.text||'Checked in with '+m.name.split(' ')[0]+'.').replace(/</g,'&lt;')}</div></div>
            </div>`).join('') : '<div class="tiny muted" style="padding:14px 0">No notes yet. Your first note starts the record.</div>'}
          </div>
        </div>
      </div>
      <div style="height:40px"></div>
    </section>`;
}

async function assignMentor(memberId, staffId){
  S.ops.mentor[memberId] = staffId || null;
  await saveState();
  const nm=staffById(staffId); toast(nm?`Assigned to ${nm.name}.`:'Set to unassigned.'); render();
}
async function addNote(memberId){
  const el=document.getElementById('note-'+memberId); const text=(el.value||'').trim();
  if(!text){ toast('Write something first.'); return; }
  const st=currentStaff();
  (S.ops.notes[memberId]=S.ops.notes[memberId]||[]).push({by:st.name+' · '+ROLES[st.role].label, text, at:Date.now()});
  await saveState(); toast('Note saved.'); render();
}
async function logCheckin(memberId){
  const st=currentStaff();
  (S.ops.checkins[memberId]=S.ops.checkins[memberId]||[]).push({by:st.name, at:Date.now()});
  await saveState(); toast('Check-in logged.'); render();
}
function nudge(memberId){ const m=memberById(memberId); toast(`Next-step suggestion sent to ${m.name.split(' ')[0]}.`); }

/* ============================================================
   INIT
   ============================================================ */
(async function init(){
  const saved=await loadState();
  if(saved){ S=Object.assign(S, saved); if(!S.completed)S.completed={}; if(!S.assessments)S.assessments={};
    if(!S.ops)S.ops={notes:{},mentor:{},checkins:{}};
    S.ops.notes=S.ops.notes||{}; S.ops.mentor=S.ops.mentor||{}; S.ops.checkins=S.ops.checkins||{};
    if(typeof S.staff==='undefined')S.staff=null;
    if(typeof S.groupId==='undefined')S.groupId=null;
    S.sabbath=S.sabbath||{}; S.habits=S.habits||{}; if(typeof S.plan==='undefined')S.plan=null; }
  await seedShared();
  render();
})();
</script>
</body>
